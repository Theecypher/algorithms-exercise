<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shus Weather Application</title>
  </head>
  <body>
    <form class="form">
      <div class="input-field">
        <img class="input-icon" src="./src/assets/weather-icon.svg" alt="" />
        <input
          class="search-input"
          type="text"
          placeholder="search for a location..."
        />
      </div>
    </form>
    <div class="container" id="container">
      <div class="left">
        <div class="todaysWeatherCard"></div>
      </div>

      <div class="right">
        <div class="weather-detail-card"></div>

        <div class="forecast-container"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
